<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🎉 EventSphere</a>
    </div>
</nav>

<div class="container mt-5">

    <h1>Add Registration</h1>

    <form action="/save-registration" method="post">

        <div class="mb-3">
            <label class="form-label">Select Student</label>

            <select name="studentId" class="form-control">

                <option value="">Choose Student</option>

                <option th:each="student : ${students}"
                        th:value="${student.id}"
                        th:text="${student.name}">
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Select Event</label>

            <select name="eventId" class="form-control">

                <option value="">Choose Event</option>

                <option th:each="event : ${events}"
                        th:value="${event.id}"
                        th:text="${event.name}">
                </option>

            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Register
        </button>

        <a href="/" class="btn btn-primary">
            Home
        </a>

    </form>

</div>

</body>
</html>
