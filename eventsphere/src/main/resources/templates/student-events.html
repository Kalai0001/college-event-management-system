<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Browse Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .card {
            border: none;
            border-radius: 15px;
        }
    </style>

</head>

<body>

    <div class="header">
        <h1>🎉 Browse Events</h1>
        <p>Discover and participate in upcoming events</p>
    </div>
    <div class="container mt-5">

        <div class="row">

            <div class="col-md-4 mb-4" th:each="event : ${events}">

                <div class="card shadow h-100">

                    <div class="card-body">

                        <h4 th:text="${event.name}"></h4>

                        <p>
                            📍 <span th:text="${event.location}"></span>
                        </p>

                        <p>
                            📅 <span th:text="${event.date}"></span>
                        </p>

                        <a th:href="@{/event-details/{id}(id=${event.id})}" class="btn btn-primary">
                            View Details
                        </a>

                        <a th:href="@{/register-event/{eventId}(eventId=${event.id})}" class="btn btn-success">
                            Register
                        </a>

                    </div>

                </div>

            </div>

        </div>

        <div class="text-center mt-4">
            <a href="/dashboard" class="btn btn-secondary">
                Back to Dashboard
            </a>
        </div>

    </div>
</body>

</html>
