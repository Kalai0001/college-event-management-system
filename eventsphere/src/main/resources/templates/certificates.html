<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Certificates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">🏆 My Certificates</h2>

        <div th:if="${#lists.isEmpty(certificates)}">

            <div class="alert alert-warning">
                No certificates available yet.
            </div>

        </div>

        <div th:each="certificate : ${certificates}" class="card mb-3">

            <div class="card-body">

                <h5>
                    Certificate Code:
                    <span th:text="${certificate.certificateCode}">
                    </span>
                </h5>

                <a th:href="@{/certificate-details/{id}(id=${certificate.id})}" class="btn btn-primary mt-2">
                    View Certificate
                </a>

            </div>

        </div>

    </div>

</body>

</html>
