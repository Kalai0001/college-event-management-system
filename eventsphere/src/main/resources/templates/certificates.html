<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Certificates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #1b2a4a;
            --ink-soft: #3c4a6b;
            --gold: #c9a23b;
            --gold-light: #e8d3a0;
            --parchment: #faf7f0;
            --line: #e3dcc8;
        }

        body {
            background-color: var(--parchment);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(201, 162, 59, 0.08), transparent 40%),
                radial-gradient(circle at 90% 0%, rgba(27, 42, 74, 0.06), transparent 35%);
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            min-height: 100vh;
        }

        .page-head {
            text-align: center;
            padding-top: 2.5rem;
            margin-bottom: 3rem;
        }

        .page-head .eyebrow {
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
        }

        .page-head h2 {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 2.4rem;
            color: var(--ink);
            margin: 0.35rem 0 0.6rem;
        }

        .page-head .rule {
            width: 70px;
            height: 3px;
            background: var(--gold);
            margin: 0 auto;
            border-radius: 2px;
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .cert-card {
            position: relative;
            background: #fffdf9;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 1.9rem 1.6rem 1.6rem;
            box-shadow: 0 2px 6px rgba(27, 42, 74, 0.06);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            overflow: hidden;
        }

        .cert-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
        }

        .cert-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(27, 42, 74, 0.12);
        }

        .seal {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .seal svg {
            width: 18px;
            height: 18px;
        }

        .cert-label {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-soft);
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .cert-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.08rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: 0.01em;
            word-break: break-word;
        }

        .btn-view {
            background-color: var(--ink);
            border: none;
            color: #fff;
            font-weight: 500;
            font-size: 0.92rem;
            padding: 0.55rem 1.3rem;
            border-radius: 6px;
            transition: background-color 0.15s ease;
        }

        .btn-view:hover {
            background-color: var(--gold);
            color: var(--ink);
        }

        .empty-state {
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
            border: 2px dashed var(--line);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            background: #fffdf9;
        }

        .empty-state .icon {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            color: var(--ink-soft);
            margin: 0;
            font-size: 0.98rem;
        }
    </style>
</head>

<body>

    <div class="container pb-5">

        <div class="page-head">
            <div class="eyebrow">Achievement Record</div>
            <h2>
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" style="vertical-align: -6px; margin-right: 6px;">
                    <path d="M7 4h10v5a5 5 0 0 1-10 0V4z" fill="#c9a23b"/>
                    <path d="M7 5H4a2 2 0 0 0 0 4 4 4 0 0 0 3.2 1.96M17 5h3a2 2 0 0 1 0 4 4 4 0 0 1-3.2 1.96" stroke="#c9a23b" stroke-width="1.4" fill="none"/>
                    <rect x="10" y="14" width="4" height="3" fill="#c9a23b"/>
                    <rect x="7" y="17" width="10" height="2" rx="1" fill="#c9a23b"/>
                </svg>
                My Certificates
            </h2>
            <div class="rule"></div>
        </div>

        <div th:if="${#lists.isEmpty(certificates)}">

            <div class="empty-state">
                <div class="icon">
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
                        <rect x="4" y="3" width="16" height="18" rx="1.5" stroke="#c9a23b" stroke-width="1.5"/>
                        <path d="M8 8h8M8 12h8M8 16h5" stroke="#c9a23b" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <p>No certificates available yet.</p>
            </div>

        </div>

        <div class="cert-grid">

            <div th:each="certificate : ${certificates}" class="cert-card">

                <div class="d-flex align-items-start gap-3 mb-3">
                    <div class="seal">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 3L2 8l10 5 8-4.3V15h2V8L12 3z" fill="#e8d3a0"/>
                            <path d="M6 11.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5" stroke="#e8d3a0" stroke-width="1.6" fill="none"/>
                        </svg>
                    </div>
                    <div>
                        <div class="cert-label">Certificate Code</div>
                        <div class="cert-code" th:text="${certificate.certificateCode}"></div>
                    </div>
                </div>

                <a th:href="@{/certificate-details/{id}(id=${certificate.id})}" class="btn btn-view">
                    View Certificate
                </a>

            </div>

        </div>

    </div>

</body>

</html>
