<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login · EventPoratl</title>

    <style>
        :root{
            --navy:#0f1b3d;
            --navy-light:#1c2c5c;
            --slate:#54607a;
            --slate-light:#8993ab;
            --bg:#eef0f5;
            --card:#ffffff;
            --border:#e1e4ec;
            --accent:#c8762a;
            --accent-soft:#fbeee0;
            --error:#b3261e;
            --error-soft:#fbeae9;
        }

        *{
            box-sizing:border-box;
        }

        html, body{
            height:100%;
            margin:0;
        }

        body{
            font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background:var(--navy);
            background-image:
                radial-gradient(circle at 15% 20%, var(--navy-light) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, var(--navy-light) 0%, transparent 40%);
            color:var(--navy);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }

        .login-wrap{
            width:100%;
            max-width:380px;
        }

        .brand{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            margin-bottom:28px;
            color:#fff;
        }

        .brand .mark{
            width:34px;
            height:34px;
            border-radius:8px;
            background:var(--accent);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:15px;
            font-weight:700;
        }

        .brand .name{
            font-size:19px;
            font-weight:600;
            letter-spacing:0.2px;
        }

        .card{
            background:var(--card);
            border-radius:14px;
            padding:36px 32px 32px;
            box-shadow:0 20px 50px rgba(15,27,61,0.35);
        }

        .card h1{
            margin:0 0 6px;
            font-size:21px;
            font-weight:700;
            color:var(--navy);
        }

        .card .sub{
            margin:0 0 26px;
            font-size:13.5px;
            color:var(--slate);
        }

        .field{
            margin-bottom:18px;
        }

        .field label{
            display:block;
            font-size:13px;
            font-weight:600;
            color:var(--navy);
            margin-bottom:6px;
        }

        .field input{
            width:100%;
            padding:11px 13px;
            font-size:14.5px;
            border:1px solid var(--border);
            border-radius:8px;
            background:#fbfbfd;
            color:var(--navy);
            transition:border-color .15s ease, box-shadow .15s ease;
        }

        .field input::placeholder{
            color:var(--slate-light);
        }

        .field input:focus{
            outline:none;
            border-color:var(--navy-light);
            box-shadow:0 0 0 3px rgba(28,44,92,0.12);
        }

        .error-box{
            display:none;
            background:var(--error-soft);
            color:var(--error);
            font-size:13px;
            font-weight:600;
            padding:10px 13px;
            border-radius:8px;
            margin-bottom:18px;
        }

        .error-box.show{
            display:block;
        }

        button[type="submit"]{
            width:100%;
            padding:12px;
            margin-top:6px;
            background:var(--navy);
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:15px;
            font-weight:600;
            letter-spacing:0.2px;
            cursor:pointer;
            transition:background .15s ease, transform .1s ease;
        }

        button[type="submit"]:hover{
            background:var(--navy-light);
        }

        button[type="submit"]:active{
            transform:translateY(1px);
        }

        button[type="submit"]:focus-visible{
            outline:2px solid var(--accent);
            outline-offset:2px;
        }

        .foot-note{
            text-align:center;
            margin-top:22px;
            font-size:12.5px;
            color:var(--slate-light);
        }
    </style>

</head>
<body>

<div class="login-wrap">

    <div class="brand">
        <span class="mark">EP</span>
        <span class="name">EventPoratl Admin</span>
    </div>

    <div class="card">
        <h1>Welcome back</h1>
        <p class="sub">Sign in to manage events, registrations, and certificates.</p>

        <div class="error-box" th:class="${loginError} ? 'error-box show' : 'error-box'">
            Incorrect username or password. Please try again.
        </div>

        <form action="/admin-login" method="post">

            <div class="field">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Enter your username"
                       autocomplete="username"
                       required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter your password"
                       autocomplete="current-password"
                       required>
            </div>

            <button type="submit">Log in</button>

        </form>
    </div>

    <p class="foot-note">Restricted to authorized administrators only.</p>

</div>

</body>
</html>
