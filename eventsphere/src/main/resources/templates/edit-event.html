<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎉 EventSphere</a>
        </div>
    </nav>

    <div class="container mt-5">

        <h1>Edit Event</h1>

        <form action="/update-event" method="post">

            <input type="hidden" name="id" th:value="${event.id}">

            <div class="mb-3">
                <label class="form-label">Event Name</label>
                <input type="text" name="name" class="form-control" th:value="${event.name}">
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" th:value="${event.location}">
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" th:value="${event.date}">
            </div>

            <div class="mb-3">
                <label class="form-label">Venue</label>
                <input type="text" name="venue" th:value="${event.venue}" class="form-control">
            </div>


            <div class="mb-3">
                <label class="form-label">Time</label>
                <input type="text" name="time" th:value="${event.time}" class="form-control">
            </div>


            <div class="mb-3">
                <label class="form-label">Organizer</label>
                <input type="text" name="organizer" th:value="${event.organizer}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" th:text="${event.description}"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Event Fee (₹)</label>

                <input type="number" name="fee" class="form-control" th:value="${event.fee}" required>
            </div>

            <button type="submit" class="btn btn-warning">
                Update Event
            </button>

            <a href="/events-page" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</body>

</html>
