<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎉 EventSphere</a>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h2 th:text="${event.name}"></h2>
            </div>

            <div class="card-body">

                <p>
                    <strong>Location:</strong>
                    <span th:text="${event.location}"></span>
                </p>

                <p>
                    <strong>Date:</strong>
                    <span th:text="${event.date}"></span>
                </p>

                <p>
                    <strong>Venue:</strong>
                    <span th:text="${event.venue}"></span>
                </p>

                <p>
                    <strong>Time:</strong>
                    <span th:text="${event.time}"></span>
                </p>

                <p>
                    <strong>Organizer:</strong>
                    <span th:text="${event.organizer}"></span>
                </p>

                <p>
                    <strong>Description:</strong>
                    <span th:text="${event.description}"></span>
                </p>

                <a th:href="@{/register-event/{eventId}(eventId=${event.id})}" class="btn btn-success">
                    Register Now
                </a>

                <a href="/student-events" class="btn btn-secondary">
                    Back
                </a>

            </div>

        </div>

    </div>

</body>

</html>
