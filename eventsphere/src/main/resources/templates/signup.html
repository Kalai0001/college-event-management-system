<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Event Portal - Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">

        <div class="text-center mt-5 mb-4">
            <h1 class="fw-bold text-dark">Event Portal</h1>
            <p class="text-muted">
                Join Hackathons, Workshops & Symposiums
            </p>
        </div>

        <div class="card shadow mx-auto" style="max-width: 450px;">

            <div class="card-header bg-success text-white text-center">
                <h4>Create Account</h4>
            </div>

            <div class="card-body">

                <form action="/signup" method="post">

                    <div class="mb-3">
                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Name">
                    </div>

                    <div class="mb-3">
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Password">
                    </div>

                    <div class="mb-3">
                        <input type="text"
                               name="college"
                               class="form-control"
                               placeholder="College">
                    </div>

                    <div class="mb-3">
                        <input type="text"
                               name="department"
                               class="form-control"
                               placeholder="Department">
                    </div>

                    <div class="mb-3">
                        <input type="number"
                               name="year"
                               class="form-control"
                               placeholder="Year">
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-success">
                            Sign Up
                        </button>
                    </div>

                </form>

                <div class="text-center mt-3">
                    <small>
                        Already have an account?
                        <a href="/login">Login</a>
                    </small>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
