            font-weight: 600;
            margin-bottom: 2px;
        }

        .event-meta {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
        }

        .event-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .badge-purple {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .badge-pink {
            background: rgba(236, 72, 153, 0.2);
            color: #f472b6;
            border: 1px solid rgba(236, 72, 153, 0.3);
        }

        .badge-cyan {
            background: rgba(34, 211, 238, 0.15);
            color: #67e8f9;
            border: 1px solid rgba(34, 211, 238, 0.3);
        }

        .badge-confirmed {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-pending {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
    </style>
</head>

<body>


    <nav class="navbar-custom">
        <a href="/dashboard" class="navbar-brand-custom">
            <div class="brand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                    <path d="M6 12v5c3 3 9 3 12 0v-5" />
                </svg>
            </div>
            <span class="brand-name">Event Portal</span>
        </a>

        <div class="nav-links">
            <a href="/student-events" class="nav-link-custom">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                Browse Events
            </a>
            <a href="/profile" class="nav-link-custom">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                My Profile
            </a>
            <a href="/certificates" class="nav-link-custom">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="8" r="6" />
                    <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11" />
                </svg>
                Certificates
            </a>
            <a href="/login" class="nav-link-custom nav-link-logout">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                    <polyline points="16,17 21,12 16,7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </a>

        </div>
    </nav>


    <div class="page-content">

        <div class="welcome-text mb-4">
            <h1>Welcome back, <span th:text="${student.name}">Student</span> 👋</h1>
            <p>Here's your activity at a glance</p>
        </div>


        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-card stat-card-purple">
                    <div class="stat-label">Total Events</div>
                    <div class="stat-number" th:text="${totalEvents}">12</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-card-pink">
                    <div class="stat-label">My Registrations</div>
                    <div class="stat-number" th:text="${myRegistrations}">4</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-card-cyan">
                    <div class="stat-label">Certificates</div>
                    <div class="stat-number" th:text="${certificates}">3</div>
                </div>
            </div>
        </div>

        <!-- My Registrations Panel -->
        <div class="events-panel mb-4">

            <div class="events-panel-header">
                <div class="panel-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                        <rect x="9" y="3" width="6" height="4" rx="1" />
                    </svg>
                </div>

                <h2>My Registrations</h2>
            </div>

            <div th:if="${#lists.isEmpty(myRegistrationList)}" class="event-row">

                <span style="color: rgba(255,255,255,0.35);">
                    No registrations yet.
                </span>

            </div>

            <div th:each="event, iterStat : ${myRegistrationList}">

                <div class="event-row">

                    <div class="event-left">

                        <div th:class="${iterStat.index % 3 == 0 ?
                    'event-icon event-icon-purple' :
                    iterStat.index % 3 == 1 ?
                    'event-icon event-icon-pink' :
                    'event-icon event-icon-cyan'}">

                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#818cf8"
                                stroke-width="2">

                                <rect x="3" y="4" width="18" height="18" rx="2" />

                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />

                            </svg>

                        </div>

                        <div>

                            <div class="event-name" th:text="${event.name}">
                                Event Name
                            </div>

                            <div class="event-meta" th:text="${event.location + ' • ' + event.date}">
                                Location • Date
                            </div>

                        </div>

                    </div>

                    <!-- <span class="event-badge badge-confirmed">
                        Registered
                    </span> -->
                    <!-- <div>
                        <span class="event-badge badge-confirmed">
                            Registered
                        </span>

                        <br><br>

                        <a th:href="@{/event-details/{id}(id=${event.id})}" class="btn btn-sm btn-info">
                            View Details
                        </a>
                    </div> -->
                    <div class="d-flex flex-column align-items-end gap-2">

                        <span class="event-badge badge-confirmed">
                            Registered
                        </span>

                        <a th:href="@{/event-details/{id}(id=${event.id})}"
                            class="text-info text-decoration-none fw-semibold">
                            View Details →
                        </a>

                    </div>
                </div>

            </div>

        </div>
    </div>
    </div>

</body>

</html>
