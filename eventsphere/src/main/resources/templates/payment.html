<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Event Payment</h2>

    <div class="card p-4">

        <h4 th:text="${event.name}">Event Name</h4>

        <p>
            Fee:
            <strong>
                ₹<span th:text="${event.fee}">200</span>
            </strong>
        </p>

        <a th:href="@{/confirm-payment/{id}(id=${registration.id})}"
           class="btn btn-success">
            Pay Now
        </a>

    </div>

</div>

</body>
</html>
