<!DOCTYPE html>
<html>

<head>
    <title>Add Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎉 EventSphere</a>
        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="mb-4">Add New Event</h1>

        <form action="/save-event" method="post">

            <div class="mb-3">
                <label class="form-label">Event Name</label>
                <input type="text" name="name" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Venue</label>
                <input type="text" name="venue" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Time</label>
                <input type="text" name="time" class="form-control" placeholder="10:00 AM">
            </div>


            <div class="mb-3">
                <label class="form-label">Organizer</label>
                <input type="text" name="organizer" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Event Fee (₹)</label>

                <input type="number" name="fee" class="form-control" placeholder="Enter Event Fee" required>
            </div>

            <button type="submit" class="btn btn-success">
                Save Event
            </button>

            <a href="/" class="btn btn-primary">
                Home
            </a>

        </form>

    </div>

</body>

</html>
