<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Event Portal - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">

        <div class="text-center mt-5 mb-4">
            <h1 class="fw-bold text-dark">Event Portal</h1>
            <p class="text-muted">
                Login to continue
            </p>
        </div>

        <div class="card shadow mx-auto" style="max-width: 450px;">

            <div class="card-header bg-dark text-white text-center">
                <h4>Login</h4>
            </div>

            <div class="card-body">

                <form action="/login" method="post">

                    <div class="mb-3">
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Password">
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-dark">
                            Login
                        </button>
                    </div>

                </form>

                <div class="text-center mt-3">
                    <small>
                        Don't have an account?
                        <a href="/signup">Create Account</a>
                    </small>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
