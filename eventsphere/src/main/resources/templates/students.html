<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎉 EventSphere</a>
        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="mb-4">All Students</h1>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Year</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.id}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.email}"></td>
                    <td th:text="${student.department}"></td>
                    <td th:text="${student.year}"></td>

                    <td>

                        <a th:href="@{/edit-student/{id}(id=${student.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a th:href="@{/delete-student/{id}(id=${student.id})}" class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>
                </tr>
            </tbody>

        </table>

        <a href="/" class="btn btn-primary">Home</a>

    </div>

</body>

</html>
