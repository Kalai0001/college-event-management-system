<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎉 EventSphere</a>
        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="mb-4">All Events</h1>

        <form action="/search-events" method="get" class="mb-4">

            <div class="input-group">

                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Search Event Name">

                <button type="submit" class="btn btn-primary">
                    Search
                </button>

            </div>

        </form>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="event : ${events}">
                    <td th:text="${event.id}"></td>
                    <td th:text="${event.name}"></td>
                    <td th:text="${event.location}"></td>
                    <td th:text="${event.date}"></td>

                    <td>

                        <a th:href="@{/event-details/{id}(id=${event.id})}"
                           class="btn btn-info btn-sm">
                            View Details
                        </a>

                        <a th:href="@{/edit-event/{id}(id=${event.id})}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a th:href="@{/delete-event/{id}(id=${event.id})}"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>
                </tr>
            </tbody>

        </table>

        <a href="/add-event" class="btn btn-success">
            Add Event
        </a>

        <a href="/" class="btn btn-primary">
            Home
        </a>

    </div>

</body>

</html>
