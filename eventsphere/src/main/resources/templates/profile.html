<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-wrapper {
            width: 100%;
            max-width: 780px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        .profile-header {
            padding: 36px 32px 28px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
        }

        .profile-header h2 {
            color: #fff;
            margin: 0 0 4px;
            font-size: 22px;
            font-weight: 700;
        }

        .profile-header p {
            color: rgba(255, 255, 255, 0.55);
            margin: 0 0 14px;
            font-size: 13px;
        }

        .student-id-badge {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 16px;
            border-radius: 20px;
            letter-spacing: 1px;
            display: inline-block;
        }

        .profile-body {
            padding: 24px 24px 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
        }

        .label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .value {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
        }

        .stats-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
            margin-top: 20px;
        }

        .stats-title {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-card-events {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            padding: 16px 10px;
            text-align: center;
        }

        .stat-card-cert {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 14px;
            padding: 16px 10px;
            text-align: center;
        }

        .stat-card-upcoming {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(99, 102, 241, 0.1));
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 14px;
            padding: 16px 10px;
            text-align: center;
        }

        .stat-number-blue {
            font-size: 28px;
            font-weight: 700;
            color: #818cf8;
            line-height: 1;
        }

        .stat-number-pink {
            font-size: 28px;
            font-weight: 700;
            color: #f472b6;
            line-height: 1;
        }

        .stat-number-cyan {
            font-size: 28px;
            font-weight: 700;
            color: #67e8f9;
            line-height: 1;
        }

        .stat-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 5px;
        }

        .btn-section {
            padding: 20px 24px 28px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-dashboard {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            text-decoration: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .btn-logout {
            background: transparent;
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.4);
            text-decoration: none;
            padding: 10px 28px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="profile-wrapper">
        <div class="profile-card">

            <div class="profile-header">
                <div class="avatar" th:text="${student.name.substring(0,1).toUpperCase()}">
                </div>
                <h2 th:text="${student.name}"></h2>
                <p th:text="${student.department + ' Student'}"></p>
                <span class="student-id-badge" th:text="'STU-' + ${student.id}">
                </span>
            </div>

            <div class="profile-body">
                <div class="info-grid">
                    <div class="info-card">
                        <div class="label">✉ Email</div>
                        <div class="value" th:text="${student.email}"></div>
                    </div>
                    <div class="info-card">
                        <div class="label">🏫 College</div>
                        <div class="value" th:text="${student.college}"></div>
                    </div>
                    <div class="info-card">
                        <div class="label">🎓 Department</div>
                        <div class="value" th:text="${student.department}"></div>
                    </div>
                    <div class="info-card">
                        <div class="label">📅 Year</div>
                        <div class="value" th:text="${student.year}"></div>
                    </div>
                </div>

                <div class="stats-section">
                    <p class="stats-title">Activity Overview</p>
                    <div class="stats-grid">
                        <div class="stat-card-events">
                            <!-- <div class="stat-number-blue">4</div> -->
                            <div class="stat-number-blue" th:text="${registeredEvents}">
                            </div>
                            <div class="stat-label">Registered Events</div>
                        </div>
                        <div class="stat-card-cert">
                            <!-- <div class="stat-number-pink">2</div> -->
                            <div class="stat-number-pink" th:text="${certificates}">
                            </div>
                            <div class="stat-label">Certificates</div>
                        </div>
                        <div class="stat-card-upcoming">
                            <!-- <div class="stat-number-cyan">1</div> -->
                            <div class="stat-number-cyan" th:text="${upcomingEvents}">
                            </div>
                            <div class="stat-label">Upcoming Events</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="btn-section">
                <a href="/dashboard" class="btn-dashboard">Dashboard</a>
                <a href="/login" class="btn-logout">Logout</a>
            </div>

        </div>
    </div>

</body>

</html>
